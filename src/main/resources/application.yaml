

spring:
  application:
    name: PDFAutoTagging
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:h2:file:${H2_DATABASE_FOLDER}/pdf-job-queue
    username: admin
    password: admin
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %X{jobId}%m%n"



server:
  port: 8080
# We want to handle setting up H2

